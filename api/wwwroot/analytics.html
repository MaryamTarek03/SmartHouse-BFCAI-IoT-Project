<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | SmartHouse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .analytics-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .analytics-card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 16px;
            padding: 1.5rem;
            margin-top: 1.5rem;
        }

        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            align-items: center;
        }

        .filters select {
            background: var(--bg-secondary);
            border: 1px solid var(--border-card);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            outline: none;
            font-family: inherit;
        }

        .btn-refresh {
            background: var(--accent-gradient);
            border: none;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-refresh:hover {
            opacity: 0.9;
        }

        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-brand">
            <div class="logo"><i class="fa-solid fa-chart-line"></i></div>
            <h1>Analytics</h1>
        </div>
        <div class="header-right">
            <a href="index.html" class="btn-small"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
        </div>
    </header>

    <div class="analytics-container">
        <div class="analytics-card">
            <div class="filters">
                <select id="homeSelect">
                    <option value="">Select Home</option>
                </select>
                <select id="roomSelect">
                    <option value="">All Rooms</option>
                </select>
                <select id="sensorSelect">
                    <option value="Temperature">Temperature</option>
                    <option value="LightLevel">Light Level</option>
                </select>
                <button class="btn-refresh" id="refreshBtn">Refresh Data</button>
            </div>
            
            <div class="chart-container">
                <canvas id="analyticsChart"></canvas>
            </div>
        </div>
    </div>

    <!-- Use local Chart.js library -->
    <script src="lib/chart.js"></script>
    <script src="analytics.js"></script>
</body>
</html>
